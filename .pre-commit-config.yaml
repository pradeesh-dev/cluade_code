repos:
  # Basic repository hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: detect-private-key
      - id: check-added-large-files

  # Type checking
  - repo: local
    hooks:
      - id: mypy #It catches many mistakes before the code runs. Ex: return type, None bugs
        name: mypy
        entry: mypy .
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: detect-secrets
        name: detect-secrets
        entry: detect-secrets-hook
        language: system

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: python -m ruff check .
        language: system
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: python -m ruff format .
        language: system
        pass_filenames: false

  - repo: local
    hooks:
      - id: semgrep
        name: semgrep
        entry: semgrep scan --config=auto --config=p/security-audit --config=p/owasp-top-ten --error
        language: system
        pass_filenames: false
        always_run: true

